<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arcane Templates Registry</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap");

      :root {
        --bg: #030305;
        --accent: oklch(0.606 0.25 292.717); /* Arcane purple */
        --accent-glow: oklch(0.606 0.25 292.717 / 0.15);
        --text: #ededed;
        --muted: #888888;
        --card-bg: rgba(255, 255, 255, 0.02);
        --card-border: rgba(255, 255, 255, 0.06);
        --input-bg: rgba(0, 0, 0, 0.4);
      }

      body {
        background-color: var(--bg);
        background-image:
          radial-gradient(
            ellipse at 50% 0%,
            var(--accent-glow) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 0% 100%,
            rgba(255, 255, 255, 0.02) 0%,
            transparent 50%
          );
        color: var(--text);
        font-family: "Inter", sans-serif;
        margin: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        background-attachment: fixed;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      .header-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        margin: 0;
        background: linear-gradient(135deg, #fff 0%, #aaa 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .ctrl-panel {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        background: var(--card-bg);
        padding: 1.5rem;
        border-radius: 16px;
        border: 1px solid var(--card-border);
        backdrop-filter: blur(12px);
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        background: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        transition: border-color 0.2s;
        gap: 0.75rem;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent);
      }

      .badge {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--muted);
        text-transform: uppercase;
      }

      input {
        background: transparent;
        border: none;
        color: var(--text);
        font-size: 0.95rem;
        width: 100%;
        outline: none;
        font-family: inherit;
      }

      button.copy-btn {
        background: var(--text);
        color: var(--bg);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }

      button.copy-btn:hover {
        opacity: 0.9;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        transition:
          transform 0.3s ease,
          border-color 0.3s,
          background 0.3s;
        backdrop-filter: blur(8px);
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-title {
        font-size: 1.15rem;
        font-weight: 500;
        margin: 0;
      }

      .version {
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        color: var(--muted);
      }

      .card-desc {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 0;
        flex-grow: 1;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .tag {
        font-size: 0.7rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        padding-top: 1rem;
        border-top: 1px solid var(--card-border);
      }

      .actions a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .actions a:hover {
        color: var(--accent);
      }

      .loading {
        text-align: center;
        color: var(--muted);
        padding: 3rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import * as React from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";

      const icons = {
        copy: React.createElement(
          "svg",
          {
            width: 14,
            height: 14,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("rect", {
            x: 9,
            y: 9,
            width: 13,
            height: 13,
            rx: 2,
            ry: 2,
          }),
          React.createElement("path", {
            d: "M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
          }),
        ),
        check: React.createElement(
          "svg",
          {
            width: 14,
            height: 14,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("polyline", { points: "20 6 9 17 4 12" }),
        ),
        search: React.createElement(
          "svg",
          {
            width: 16,
            height: 16,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("circle", { cx: 11, cy: 11, r: 8 }),
          React.createElement("line", { x1: 21, y1: 21, x2: 16.65, y2: 16.65 }),
        ),
        link: React.createElement(
          "svg",
          {
            width: 12,
            height: 12,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("path", {
            d: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6",
          }),
          React.createElement("polyline", { points: "15 3 21 3 21 9" }),
          React.createElement("line", { x1: 10, y1: 14, x2: 21, y2: 3 }),
        ),
      };

      function App() {
        const registryUrl = React.useMemo(
          () => `${location.origin}/registry.json`,
          [],
        );
        const [templates, setTemplates] = React.useState([]);
        const [search, setSearch] = React.useState("");
        const [copied, setCopied] = React.useState(false);
        const [loading, setLoading] = React.useState(true);

        React.useEffect(() => {
          fetch(registryUrl)
            .then((res) => res.json())
            .then((data) => {
              setTemplates(data.templates || []);
              setLoading(false);
            })
            .catch(() => setLoading(false));
        }, [registryUrl]);

        const filtered = React.useMemo(() => {
          const s = search.toLowerCase();
          return templates.filter(
            (t) =>
              t.name.toLowerCase().includes(s) ||
              t.description.toLowerCase().includes(s),
          );
        }, [search, templates]);

        const copyText = async () => {
          try {
            await navigator.clipboard.writeText(registryUrl);
          } catch (e) {}
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        return React.createElement(
          "div",
          { className: "container" },
          React.createElement(
            "div",
            { className: "header-section" },
            React.createElement("h1", null, "Arcane Templates Registry"),
            React.createElement(
              "div",
              { className: "ctrl-panel" },
              React.createElement(
                "div",
                { className: "input-wrapper" },
                React.createElement("span", { className: "badge" }, "URL"),
                React.createElement("input", {
                  readOnly: true,
                  value: registryUrl,
                  onFocus: (e) => e.target.select(),
                }),
                React.createElement(
                  "button",
                  { className: "copy-btn", onClick: copyText },
                  copied ? icons.check : icons.copy,
                  copied ? "Copied" : "Copy",
                ),
              ),
              React.createElement(
                "div",
                {
                  className: "input-wrapper",
                  style: {
                    background: "transparent",
                    border: "1px solid rgba(255,255,255,0.1)",
                  },
                },
                icons.search,
                React.createElement("input", {
                  placeholder: "Search templates...",
                  value: search,
                  onChange: (e) => setSearch(e.target.value),
                }),
              ),
            ),
          ),
          loading
            ? React.createElement(
                "div",
                { className: "loading" },
                "Loading templates...",
              )
            : React.createElement(
                "div",
                { className: "grid" },
                filtered.map((t) =>
                  React.createElement(
                    "div",
                    { className: "card", key: t.id },
                    React.createElement(
                      "div",
                      { className: "card-header" },
                      React.createElement(
                        "h3",
                        { className: "card-title" },
                        t.name,
                      ),
                      React.createElement(
                        "span",
                        { className: "version" },
                        `v${t.version}`,
                      ),
                    ),
                    React.createElement(
                      "p",
                      { className: "card-desc" },
                      t.description,
                    ),
                    t.tags &&
                      t.tags.length > 0 &&
                      React.createElement(
                        "div",
                        { className: "tags" },
                        t.tags.map((tag) =>
                          React.createElement(
                            "span",
                            { className: "tag", key: tag },
                            tag,
                          ),
                        ),
                      ),
                    React.createElement(
                      "div",
                      { className: "actions" },
                      React.createElement(
                        "a",
                        { href: t.documentation_url, target: "_blank" },
                        "Docs",
                        icons.link,
                      ),
                      React.createElement(
                        "a",
                        { href: t.compose_url, target: "_blank" },
                        "Compose",
                      ),
                    ),
                  ),
                ),
              ),
        );
      }

      createRoot(document.getElementById("root")).render(
        React.createElement(App),
      );
    </script>
  </body>
</html>
