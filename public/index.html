<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arcane Templates Registry</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap");

      :root {
        --bg: #030305;
        --accent: oklch(0.606 0.25 292.717);
        --accent-glow: oklch(0.606 0.25 292.717 / 0.15);
        --text: #ededed;
        --muted: #888888;
        --muted-bright: #b9b9c2;
        --card-bg: rgba(255, 255, 255, 0.02);
        --card-border: rgba(255, 255, 255, 0.06);
        --input-bg: rgba(0, 0, 0, 0.4);
        --panel-strong: rgba(255, 255, 255, 0.035);
        --tab-bg: rgba(255, 255, 255, 0.03);
      }

      body {
        background-color: var(--bg);
        background-image:
          radial-gradient(
            ellipse at 50% 0%,
            var(--accent-glow) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 0% 100%,
            rgba(255, 255, 255, 0.02) 0%,
            transparent 50%
          );
        color: var(--text);
        font-family: "Geist", sans-serif;
        margin: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        background-attachment: fixed;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      .header-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        margin: 0;
        background: linear-gradient(135deg, #fff 0%, #aaa 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero-copy {
        max-width: 720px;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .hero-kicker {
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hero-subtitle {
        margin: 0;
        color: var(--muted-bright);
        font-size: 1rem;
        line-height: 1.65;
      }

      .ctrl-panel {
        width: 100%;
        max-width: 760px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        background: var(--card-bg);
        padding: 1.5rem;
        border-radius: 16px;
        border: 1px solid var(--card-border);
        backdrop-filter: blur(12px);
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        background: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        transition: border-color 0.2s;
        gap: 0.75rem;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent);
      }

      .badge {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--muted);
        text-transform: uppercase;
      }

      input {
        background: transparent;
        border: none;
        color: var(--text);
        font-size: 0.95rem;
        width: 100%;
        outline: none;
        font-family: inherit;
      }

      button.copy-btn {
        background: var(--text);
        color: var(--bg);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }

      button.copy-btn:hover {
        opacity: 0.9;
      }

      .top-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .meta-pill {
        border: 1px solid var(--card-border);
        background: var(--tab-bg);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        color: var(--muted-bright);
        font-size: 0.78rem;
      }

      .meta-pill strong {
        color: var(--text);
        font-weight: 500;
      }

      .tabs {
        display: inline-flex;
        gap: 0.45rem;
        align-self: flex-start;
        padding: 0.35rem;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid var(--card-border);
        border-radius: 999px;
      }

      .tab-btn {
        border: none;
        background: transparent;
        color: var(--muted);
        border-radius: 999px;
        padding: 0.75rem 1rem;
        cursor: pointer;
        font: inherit;
        font-size: 0.88rem;
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .tab-btn:hover {
        color: var(--text);
      }

      .tab-btn.active {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.14) 0%,
          rgba(255, 255, 255, 0.06) 100%
        );
        color: var(--text);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        transition:
          transform 0.3s ease,
          border-color 0.3s,
          background 0.3s;
        backdrop-filter: blur(8px);
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
      }

      .card-title {
        font-size: 1.15rem;
        font-weight: 500;
        margin: 0;
      }

      .version {
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        color: var(--muted);
      }

      .card-desc {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 0;
        flex-grow: 1;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .tag {
        font-size: 0.7rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        padding-top: 1rem;
        border-top: 1px solid var(--card-border);
      }

      .actions a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .actions a:hover {
        color: var(--accent);
      }

      .empty-state,
      .info-shell {
        background: var(--panel-strong);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 1.75rem;
        backdrop-filter: blur(12px);
      }

      .empty-state {
        text-align: center;
        color: var(--muted-bright);
      }

      .info-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
        gap: 2rem;
        align-items: start;
      }

      .info-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .section-label {
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .info-title {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: -0.03em;
      }

      .info-copy {
        margin: 0;
        color: var(--muted-bright);
        line-height: 1.7;
      }

      .side-card {
        border: 1px solid var(--card-border);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.025);
        padding: 1.2rem;
      }

      .side-card h3 {
        margin: 0 0 0.55rem;
        font-size: 0.95rem;
      }

      .side-card p {
        margin: 0;
        color: var(--muted-bright);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .monospace {
        font-family: "Geist Mono", monospace;
      }

      .logic-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .logic-chip {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 999px;
        padding: 0.55rem 0.85rem;
        color: var(--muted-bright);
        font-size: 0.82rem;
      }

      .logic-chip strong {
        color: var(--text);
        font-weight: 600;
      }

      .logic-flow {
        display: flex;
        flex-direction: column;
        gap: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .logic-row {
        display: grid;
        grid-template-columns: minmax(140px, 180px) minmax(0, 1fr);
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .logic-term {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .logic-step {
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .logic-title {
        margin: 0;
        font-size: 1rem;
      }

      .logic-body {
        color: var(--muted-bright);
        font-size: 0.96rem;
        line-height: 1.75;
      }

      .logic-body code,
      .info-copy code {
        font-family: "Geist Mono", monospace;
        font-size: 0.92em;
        color: var(--text);
      }

      .logic-note {
        margin: 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.6;
      }

      .rail-card {
        position: sticky;
        top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
      }

      .rail-title {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }

      .rail-block {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding-bottom: 0.9rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .rail-block:last-of-type {
        border-bottom: none;
        padding-bottom: 0;
      }

      .rail-label {
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .rail-value {
        color: var(--text);
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .rail-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
      }

      .rail-footnote {
        color: var(--muted-bright);
        font-size: 0.9rem;
        line-height: 1.65;
      }

      .stack-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .stack-item {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .stack-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .stack-item strong {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .stack-item span {
        color: var(--text);
        line-height: 1.5;
      }

      .loading {
        text-align: center;
        color: var(--muted);
        padding: 3rem;
      }

      @media (max-width: 820px) {
        .container {
          padding: 3rem 1rem;
        }

        .info-shell {
          grid-template-columns: 1fr;
        }

        .logic-row {
          grid-template-columns: 1fr;
          gap: 0.5rem;
        }

        .tabs {
          width: 100%;
        }

        .tab-btn {
          flex: 1;
        }

        .card-header {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import * as React from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";

      const icons = {
        copy: React.createElement(
          "svg",
          {
            width: 14,
            height: 14,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("rect", {
            x: 9,
            y: 9,
            width: 13,
            height: 13,
            rx: 2,
            ry: 2,
          }),
          React.createElement("path", {
            d: "M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
          }),
        ),
        check: React.createElement(
          "svg",
          {
            width: 14,
            height: 14,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("polyline", { points: "20 6 9 17 4 12" }),
        ),
        search: React.createElement(
          "svg",
          {
            width: 16,
            height: 16,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("circle", { cx: 11, cy: 11, r: 8 }),
          React.createElement("line", { x1: 21, y1: 21, x2: 16.65, y2: 16.65 }),
        ),
        link: React.createElement(
          "svg",
          {
            width: 12,
            height: 12,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          React.createElement("path", {
            d: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6",
          }),
          React.createElement("polyline", { points: "15 3 21 3 21 9" }),
          React.createElement("line", { x1: 10, y1: 14, x2: 21, y2: 3 }),
        ),
      };

      function renderTemplateCard(template) {
        return React.createElement(
          "div",
          { className: "card", key: template.id },
          React.createElement(
            "div",
            { className: "card-header" },
            React.createElement(
              "h3",
              { className: "card-title" },
              template.name,
            ),
            React.createElement(
              "span",
              { className: "version monospace" },
              `v${template.version}`,
            ),
          ),
          React.createElement(
            "p",
            { className: "card-desc" },
            template.description,
          ),
          template.tags &&
            template.tags.length > 0 &&
            React.createElement(
              "div",
              { className: "tags" },
              template.tags.map((tag) =>
                React.createElement(
                  "span",
                  { className: "tag", key: tag },
                  tag,
                ),
              ),
            ),
          React.createElement(
            "div",
            { className: "actions" },
            React.createElement(
              "a",
              { href: template.documentation_url, target: "_blank" },
              "Docs",
              icons.link,
            ),
            React.createElement(
              "a",
              { href: template.compose_url, target: "_blank" },
              "Compose",
            ),
          ),
        );
      }

      function renderLogicPanel(registryVersion, templateCount) {
        return React.createElement(
          "div",
          { className: "info-shell" },
          React.createElement(
            "div",
            { className: "info-column" },
            React.createElement(
              "span",
              { className: "section-label monospace" },
              "How publishing works",
            ),
            React.createElement(
              "h2",
              { className: "info-title" },
              "Registry versions now move with real template changes.",
            ),
            React.createElement(
              "p",
              { className: "info-copy" },
              "Each template entry is generated from ",
              React.createElement("code", null, "templates/<id>/"),
              ". The registry publishes a ",
              React.createElement("code", null, "content_hash"),
              " so consumers can tell when an existing template changed without having to infer it from repo history.",
            ),
            React.createElement(
              "div",
              { className: "logic-summary" },
              React.createElement(
                "span",
                { className: "logic-chip" },
                React.createElement("strong", null, "New ID"),
                " -> minor bump",
              ),
              React.createElement(
                "span",
                { className: "logic-chip" },
                React.createElement("strong", null, "Existing change"),
                " -> patch bump",
              ),
              React.createElement(
                "span",
                { className: "logic-chip" },
                React.createElement("strong", null, "Removed template"),
                " -> patch bump",
              ),
            ),
            React.createElement(
              "div",
              { className: "logic-flow" },
              React.createElement(
                "div",
                { className: "logic-row" },
                React.createElement(
                  "div",
                  { className: "logic-term" },
                  React.createElement(
                    "span",
                    { className: "logic-step monospace" },
                    "Step 01",
                  ),
                  React.createElement(
                    "h3",
                    { className: "logic-title" },
                    "Additions",
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "logic-body" },
                  "A brand new template ID means the catalog itself grew. That stays a ",
                  React.createElement("code", null, "minor"),
                  " bump because Arcane is seeing a new thing to install.",
                ),
              ),
              React.createElement(
                "div",
                { className: "logic-row" },
                React.createElement(
                  "div",
                  { className: "logic-term" },
                  React.createElement(
                    "span",
                    { className: "logic-step monospace" },
                    "Step 02",
                  ),
                  React.createElement(
                    "h3",
                    { className: "logic-title" },
                    "Updates and removals",
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "logic-body" },
                  "If a compose file, metadata, env example, or template README changes, the registry now bumps ",
                  React.createElement("code", null, "patch"),
                  ". Removals use the same rule so consumers can still see the catalog moved even without a new template ID.",
                ),
              ),
              React.createElement(
                "div",
                { className: "logic-row" },
                React.createElement(
                  "div",
                  { className: "logic-term" },
                  React.createElement(
                    "span",
                    { className: "logic-step monospace" },
                    "Step 03",
                  ),
                  React.createElement(
                    "h3",
                    { className: "logic-title" },
                    "Fingerprint inputs",
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "logic-body" },
                  "The published hash is derived from ",
                  React.createElement("code", null, "template.json"),
                  ", the compose file, ",
                  React.createElement("code", null, ".env.example"),
                  ", and any template README. The website and registry are reading the same source of truth.",
                ),
              ),
            ),
            React.createElement(
              "p",
              { className: "logic-note" },
              "The point is simple: registry version movement now reflects catalog movement, not just brand new entries.",
            ),
          ),
          React.createElement(
            "div",
            { className: "info-column" },
            React.createElement(
              "div",
              { className: "side-card rail-card" },
              React.createElement(
                "h3",
                { className: "rail-title" },
                "Registry snapshot",
              ),
              React.createElement(
                "div",
                { className: "rail-block" },
                React.createElement(
                  "span",
                  { className: "rail-label monospace" },
                  "Registry version",
                ),
                React.createElement(
                  "span",
                  { className: "rail-value monospace" },
                  registryVersion,
                ),
              ),
              React.createElement(
                "div",
                { className: "rail-block" },
                React.createElement(
                  "span",
                  { className: "rail-label monospace" },
                  "Template count",
                ),
                React.createElement(
                  "span",
                  { className: "rail-value" },
                  `${templateCount} entries`,
                ),
              ),
              React.createElement(
                "div",
                { className: "rail-block" },
                React.createElement(
                  "span",
                  { className: "rail-label monospace" },
                  "Arcane consumes",
                ),
                React.createElement(
                  "span",
                  { className: "rail-footnote" },
                  "The app reads the registry URL above and gets generated compose links, env examples, docs links, and the new fingerprint.",
                ),
              ),
              React.createElement("div", { className: "rail-divider" }),
              React.createElement(
                "p",
                { className: "rail-footnote" },
                "This keeps the explanation lightweight while still making the bumping rules explicit.",
              ),
            ),
          ),
        );
      }

      function App() {
        const registryUrl = React.useMemo(
          () => `${location.origin}/registry.json`,
          [],
        );
        const [registry, setRegistry] = React.useState(null);
        const [templates, setTemplates] = React.useState([]);
        const [search, setSearch] = React.useState("");
        const [copied, setCopied] = React.useState(false);
        const [loading, setLoading] = React.useState(true);
        const [activeTab, setActiveTab] = React.useState("templates");

        React.useEffect(() => {
          fetch(registryUrl)
            .then((res) => res.json())
            .then((data) => {
              setRegistry(data);
              setTemplates(data.templates || []);
              setLoading(false);
            })
            .catch(() => setLoading(false));
        }, [registryUrl]);

        const filtered = React.useMemo(() => {
          const lowered = search.toLowerCase();
          return templates.filter(
            (template) =>
              template.name.toLowerCase().includes(lowered) ||
              template.description.toLowerCase().includes(lowered),
          );
        }, [search, templates]);

        const copyText = async () => {
          try {
            await navigator.clipboard.writeText(registryUrl);
          } catch (error) {}
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        const registryVersion = registry?.version || "Unknown";
        const templateCount = templates.length;
        const visibleCount = filtered.length;

        let mainContent = React.createElement(
          "div",
          { className: "loading" },
          "Loading templates...",
        );

        if (!loading && activeTab === "templates") {
          mainContent = React.createElement(
            "div",
            { className: "panel" },
            filtered.length === 0
              ? React.createElement(
                  "div",
                  { className: "empty-state" },
                  "No templates match that search yet.",
                )
              : React.createElement(
                  "div",
                  { className: "grid" },
                  filtered.map(renderTemplateCard),
                ),
          );
        }

        if (!loading && activeTab === "logic") {
          mainContent = renderLogicPanel(registryVersion, templateCount);
        }

        return React.createElement(
          "div",
          { className: "container" },
          React.createElement(
            "div",
            { className: "header-section" },
            React.createElement("h1", null, "Arcane Templates Registry"),
            React.createElement(
              "div",
              { className: "hero-copy" },
              React.createElement(
                "span",
                { className: "hero-kicker monospace" },
                "Community Docker Compose catalog",
              ),
              React.createElement(
                "p",
                { className: "hero-subtitle" },
                "Browse deployable templates, copy the registry URL into Arcane, and inspect how the registry version moves when a template is added, updated, documented, or removed.",
              ),
            ),
            React.createElement(
              "div",
              { className: "ctrl-panel" },
              React.createElement(
                "div",
                { className: "top-meta" },
                React.createElement(
                  "span",
                  { className: "meta-pill" },
                  React.createElement("strong", null, registryVersion),
                  " registry version",
                ),
                React.createElement(
                  "span",
                  { className: "meta-pill" },
                  React.createElement("strong", null, templateCount),
                  " published templates",
                ),
                React.createElement(
                  "span",
                  { className: "meta-pill monospace" },
                  React.createElement("strong", null, visibleCount),
                  " visible in current search",
                ),
              ),
              React.createElement(
                "div",
                { className: "input-wrapper" },
                React.createElement("span", { className: "badge" }, "URL"),
                React.createElement("input", {
                  readOnly: true,
                  value: registryUrl,
                  onFocus: (event) => event.target.select(),
                }),
                React.createElement(
                  "button",
                  { className: "copy-btn", onClick: copyText, type: "button" },
                  copied ? icons.check : icons.copy,
                  copied ? "Copied" : "Copy",
                ),
              ),
              React.createElement(
                "div",
                {
                  className: "input-wrapper",
                  style: {
                    background: "transparent",
                    border: "1px solid rgba(255,255,255,0.1)",
                  },
                },
                icons.search,
                React.createElement("input", {
                  placeholder: "Search templates...",
                  value: search,
                  onChange: (event) => setSearch(event.target.value),
                }),
              ),
              React.createElement(
                "div",
                { className: "tabs" },
                React.createElement(
                  "button",
                  {
                    className:
                      activeTab === "templates" ? "tab-btn active" : "tab-btn",
                    onClick: () => setActiveTab("templates"),
                    type: "button",
                  },
                  "Templates",
                ),
                React.createElement(
                  "button",
                  {
                    className:
                      activeTab === "logic" ? "tab-btn active" : "tab-btn",
                    onClick: () => setActiveTab("logic"),
                    type: "button",
                  },
                  "Registry Logic",
                ),
              ),
            ),
          ),
          mainContent,
        );
      }

      createRoot(document.getElementById("root")).render(
        React.createElement(App),
      );
    </script>
  </body>
</html>
